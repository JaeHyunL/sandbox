# === Redis Master 설정 (서버1) ===
# Redis 7.2 (BSD 라이선스 마지막 버전 — 7.4부터 RSALv2/SSPLv1로 라이선스 변경되어 상용/SaaS 사용 제약 있음)

port 6379
bind 0.0.0.0 -::1
protected-mode no

daemonize no
dir /data
pidfile /var/run/redis.pid
logfile ""

# 영속성
appendonly yes
appendfsync everysec

# 복제 관련
replica-read-only yes

# 이 노드가 다운되었다가 복구될 때 자기 자신이 실수로 다시 master로
# 승격되지 않도록 sentinel이 관리하므로 별도 replicaof 설정 없음(이 노드가 최초 master)
