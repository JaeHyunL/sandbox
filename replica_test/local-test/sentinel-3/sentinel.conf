# 로컬 시뮬레이션용 Sentinel 설정 (3번, 투표 전용)
port 26379
dir "/tmp"

# 고정 IP를 쓰므로 hostname resolve/announce는 사용하지 않는다.
# resolve-hostnames를 켜두면 같은 컨테이너가 hostname("redis-master")과
# IP(172.28.0.10) 두 정체성으로 동시에 추적되어, 승격 시 자기 자신을
# replica로 설정하는 self-loop 버그가 발생한 적이 있다.
sentinel monitor mymaster 172.28.0.11 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 60000

# Generated by CONFIG REWRITE
latency-tracking-info-percentiles 50 99 99.9
user default on nopass sanitize-payload ~* &* +@all
sentinel myid 426d140ec8af29f70bfd0059658d9e9c6172b258
sentinel config-epoch mymaster 8
sentinel leader-epoch mymaster 8
sentinel current-epoch 8

sentinel known-replica mymaster 172.28.0.10 6379

sentinel known-sentinel mymaster 172.28.0.12 26379 163f34786caebf0c79297bed43825a03d06e2787

sentinel known-sentinel mymaster 172.28.0.13 26379 6506af7c1130e1d6abc66de37131f7078288a99f

