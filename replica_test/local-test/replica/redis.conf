# 로컬 시뮬레이션용 Redis Replica 설정
port 6379
bind 0.0.0.0 -::1
protected-mode no

daemonize no
dir "/data"
logfile ""

appendonly yes
appendfsync everysec
replica-read-only yes

# 같은 도커 네트워크 안에서는 서비스명으로 서로를 찾을 수 있음

# Generated by CONFIG REWRITE
latency-tracking-info-percentiles 50 99 99.9
save 3600 1
save 300 100
save 60 10000
user default on nopass sanitize-payload ~* &* +@all
