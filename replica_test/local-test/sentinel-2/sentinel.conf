# 로컬 시뮬레이션용 Sentinel 설정 (2번)
port 26379
dir "/tmp"

# Docker 서비스명(호스트명)을 monitor 대상으로 쓰기 위해 필요
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

sentinel monitor mymaster 172.21.0.3 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 60000

# Generated by CONFIG REWRITE
latency-tracking-info-percentiles 50 99 99.9
user default on nopass sanitize-payload ~* &* +@all
sentinel myid 146c5f47cd785f2585103efe89d289c962cd6b01
sentinel config-epoch mymaster 1
sentinel leader-epoch mymaster 1
sentinel current-epoch 1

sentinel known-replica mymaster redis-master 6379

sentinel known-sentinel mymaster 172.21.0.5 26379 44b09e2ebc08d863662c1d7818281c52940dafe5

sentinel known-sentinel mymaster 172.21.0.6 26379 affccd73ce5d50bb9bb34a0529a4fb92473ed892

sentinel known-replica mymaster 172.21.0.2 6379
