# === Redis Replica 설정 (서버2) ===
# Redis 7.2 (BSD 라이선스 마지막 버전)

port 6379
bind 0.0.0.0 -::1
protected-mode no

daemonize no
dir /data
pidfile /var/run/redis.pid
logfile ""

appendonly yes
appendfsync everysec

replica-read-only yes

# !!! 아래 <MASTER_IP> 를 서버1(master)의 실제 IP로 반드시 교체하세요 !!!
replicaof <MASTER_IP> 6379
